<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Search by Ingredient</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
      // Apply theme before paint to avoid a flash of the wrong colors.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          if (saved !== 'light' && saved !== 'dark') {
            saved = window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
          }
          document.documentElement.setAttribute('data-theme', saved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <main class="app">
      <div class="app__header">
        <div>
          <h1 class="app__title">Recipe Search</h1>
          <p class="app__subtitle">Find recipes by an ingredient you have on hand.</p>
        </div>
        <button
          id="theme-toggle"
          class="theme-toggle"
          type="button"
          aria-pressed="false"
          aria-label="Toggle dark mode"
        >
          Dark mode
        </button>
      </div>

      <form id="search-form" class="search" novalidate>
        <label class="search__label" for="ingredient-input">Ingredient</label>
        <div class="search__row">
          <input
            id="ingredient-input"
            class="search__input"
            type="text"
            name="ingredient"
            placeholder="e.g. tomato"
            autocomplete="off"
            aria-describedby="search-status"
          />
          <button id="search-button" class="search__button" type="submit">
            Search
          </button>
        </div>
      </form>

      <p id="search-status" class="status" role="status" aria-live="polite"></p>

      <ul id="results" class="results" aria-label="Search results"></ul>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
